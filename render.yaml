services:
  - type: web
    name: live-leaderboard-api
    runtime: node
    plan: free
    buildCommand: cd server && npm ci
    startCommand: cd server && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://live-leaderboard-client.onrender.com
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: live-leaderboard-redis
          property: connectionString

  - type: keyvalue
    name: live-leaderboard-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
